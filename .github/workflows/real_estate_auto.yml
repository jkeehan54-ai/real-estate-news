name: Real Estate Cloud Automated Pipeline

on:
  schedule:
    - cron: '0 0 1 * *'  # 매월 1일 자정(UTC) 자동 실행
  workflow_dispatch:     # GitHub 웹 UI에서 수동 즉시 실행 지원

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib

      - name: Run Automation Engine
        env:
          DATA_PORTAL_KEY: ${{ secrets.DATA_PORTAL_KEY }}
          BOK_ECOS_KEY: ${{ secrets.BOK_ECOS_KEY }}
        run: |
          # 중첩된 폴더 구조를 고려하여 현재 경로에서 파이썬 실행
          if [ -f "real_estate_cloud_auto.py" ]; then
            python real_estate_cloud_auto.py
          elif [ -f "real-estate-news/real_estate_cloud_auto.py" ]; then
            python real-estate-news/real_estate_cloud_auto.py
          else
            # 상위/하위 어디에 있든 찾아내어 실행
            python $(find . -name "real_estate_cloud_auto.py" | head -n 1)
          fi

      - name: Upload Generated Chart Artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-analysis-chart
          path: |
            cloud_automated_market_analysis.png
            **/cloud_automated_market_analysis.png