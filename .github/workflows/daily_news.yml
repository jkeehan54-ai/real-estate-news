name: daily news update

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00(KST)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Generate news
        run: |
          python generate_news_modular.py

      - name: Verify generated HTML
        run: |
          echo "========================================"
          echo "Generated index.html"
          echo "========================================"

          pwd
          ls -lh index.html

          echo ""
          echo "========== HEAD (처음 30줄) =========="
          head -30 index.html

          echo ""
          echo "========== BRN =========="
          grep -n "BRN" index.html || true

          echo ""
          echo "========== 오늘의 뉴스 통계 =========="
          grep -n "오늘의 뉴스 통계" index.html || true

          echo ""
          echo "========== 언론사별 기사수 =========="
          grep -n "언론사별 기사수" index.html || true

          echo ""
          echo "========== 시장동향 =========="
          grep -n "시장동향" index.html || true

          echo ""
          echo "========== 정책 =========="
          grep -n "정책" index.html || true

          echo ""
          echo "========== 청약 =========="
          grep -n "청약" index.html || true

          echo ""
          echo "========== 공급개발 =========="
          grep -n "공급개발" index.html || true

          echo ""
          echo "========== 재건축 =========="
          grep -n "재건축" index.html || true

          echo ""
          echo "========== 세제 =========="
          grep -n "세제" index.html || true

          echo ""
          echo "========== 부산경남 =========="
          grep -n "부산경남" index.html || true

          echo ""
          echo "========== 마지막 30줄 =========="
          tail -30 index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
